name: Publish n8n Community Node

on:
  push:
    branches:
      - main

jobs:
  build_and_publish:
    name: Build & Publish via Semantic-Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for semantic-release to create github releases/tags
      issues: write
      pull-requests: write
      id-token: write # Essential for npm provenance verified publishing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for semantic-release to analyze all commits

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run Tests
        run: npm run test
        
      - name: Build Application
        run: npm run build

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
